name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Standart Git kimliklerini tanımlayın
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Şifresiz güvenli kimlik doğrulama ayarı (CRITICAL)
          # Hugging Face'in artık zorunlu kıldığı güvenli token metodunu tanımlıyoruz
          git config --global credential.helper store
          echo "https://sagiky:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # 3. Temiz ve şifresiz URL ile uzak depoyu ekleyin
          git remote add hf https://huggingface.co/spaces/sagiky/epiceditor
          
          # 4. Değişiklikleri zorlayarak (force) yükleyin
          git push --force hf main
